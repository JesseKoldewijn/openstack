name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PARITY_LOCALSTACK_IMAGE: localstack/localstack:3.7.2
  PARITY_OPENSTACK_IMAGE: ghcr.io/jessekoldewijn/openstack:latest
  PARITY_BENCHMARK_RUNTIME_MODE: symmetric-docker
  PARITY_BENCHMARK_EXECUTION_ORDER: alternating
  PARITY_BENCHMARK_LANE_MODE: harness-influenced
  PARITY_DOCKER_CPU_LIMIT: "2"
  PARITY_DOCKER_MEMORY_LIMIT: 4g
  PARITY_DOCKER_NETWORK_MODE: bridge
  AWS_CLI_PATH: /home/runner/.local/bin/aws

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Add rustfmt table to workflow summary
        if: always()
        run: |
          {
            echo "## Rustfmt"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Result | \\`${{ job.status }}\\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
          key: clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Add clippy table to workflow summary
        if: always()
        run: |
          {
            echo "## Clippy"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Result | \\`${{ job.status }}\\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-${{ matrix.os }}
          key: test-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Run unit tests
        run: cargo test --workspace --lib --bins
      - name: Run integration tests
        run: cargo test --workspace --tests
        env:
          SKIP_DOCKER_TESTS: "1"
      - name: Add tests table to workflow summary
        if: always()
        run: |
          {
            echo "## Tests"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Result | \\`${{ job.status }}\\` |"
            echo "| OS | \\`${{ matrix.os }}\\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  studio-ui-gates:
    name: Studio UI Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-studio-ui
          key: studio-ui-${{ hashFiles('**/Cargo.lock') }}
      - name: Run Studio crate tests
        run: cargo test -p openstack-studio-ui
      - name: Run Studio integration E2E tests
        run: cargo test -p openstack-integration-tests --test studio_e2e_tests
        env:
          SKIP_DOCKER_TESTS: "1"

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-release
          key: build-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release binary
        run: cargo build --release --bin openstack
      - name: Enforce release binary size budget
        run: ./scripts/check_release_binary_size.sh target/release/openstack 55
      - name: Upload binary artifact
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openstack-linux-amd64
          path: target/release/openstack
          retention-days: 7

  verify-build-artifact:
    name: Verify release artifact
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: openstack-linux-amd64
          path: ./artifacts
      - name: Smoke check binary
        run: |
          chmod +x ./artifacts/openstack
          timeout 10s ./artifacts/openstack --help > /dev/null
          timeout 10s ./artifacts/openstack --version > /dev/null
      - name: Add build artifact table to workflow summary
        if: always()
        run: |
          {
            echo "## Build Artifact"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Result | \\`${{ job.status }}\\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-openstack-runtime-image:
    name: Prepare OpenStack runtime image
    runs-on: ubuntu-latest
    outputs:
      openstack_runtime_image_ref: ${{ steps.runtime_meta.outputs.image_ref }}
      openstack_runtime_image_id: ${{ steps.runtime_id.outputs.image_id }}
      openstack_runtime_image_artifact: ${{ steps.runtime_meta.outputs.image_artifact }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute deterministic runtime image reference
        id: runtime_meta
        run: |
          set -euo pipefail
          image_ref="openstack-runtime-ci:${{ github.run_id }}-${{ github.sha }}"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_artifact=openstack-runtime-image-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
      - name: Build OpenStack runtime image once
        run: |
          set -euo pipefail
          docker build --target runtime -t "${{ steps.runtime_meta.outputs.image_ref }}" .
      - name: Capture immutable runtime image id
        id: runtime_id
        run: |
          set -euo pipefail
          image_id="$(docker image inspect "${{ steps.runtime_meta.outputs.image_ref }}" --format '{{.Id}}')"
          echo "image_id=${image_id}" >> "$GITHUB_OUTPUT"
          echo "image_id=${image_id}" >> "$GITHUB_STEP_SUMMARY"
      - name: Export runtime image as artifact
        if: env.ACT != 'true'
        run: |
          set -euo pipefail
          docker save "${{ steps.runtime_meta.outputs.image_ref }}" -o /tmp/openstack-runtime-image.tar
      - name: Upload runtime image artifact
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.runtime_meta.outputs.image_artifact }}
          path: /tmp/openstack-runtime-image.tar
          retention-days: 2

  validate-harness-coverage:
    name: Validate Harness Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate service matrix coverage
        run: python3 scripts/validate_harness_coverage.py
      - name: Add coverage validation table to workflow summary
        if: always()
        run: |
          {
            echo "## Harness Coverage"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Result | \\`${{ job.status }}\\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  studio-coverage:
    name: Studio Coverage Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Generate Studio coverage report
        run: python3 scripts/studio_coverage_report.py
      - name: Enforce guided coverage gate
        run: python3 scripts/studio_guided_coverage_gate.py

  studio-manifest-validation:
    name: Studio Manifest Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate guided manifest schema and semantics
        run: cargo test -p openstack-studio-ui guided_manifest::tests -- --nocapture

  studio-performance-budget:
    name: Studio Asset Budget
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check Studio asset budget
        run: bash scripts/check_studio_asset_budget.sh

  parity-core:
    name: Parity (core)
    runs-on: ubuntu-latest
    needs: [prepare-openstack-runtime-image]
    env:
      PARITY_OPENSTACK_IMAGE: ${{ needs.prepare-openstack-runtime-image.outputs.openstack_runtime_image_ref }}
      PARITY_OPENSTACK_IMAGE_ID: ${{ needs.prepare-openstack-runtime-image.outputs.openstack_runtime_image_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-parity-core
          key: parity-core-${{ hashFiles('**/Cargo.lock') }}
      - name: Ensure AWS CLI is installed
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          if command -v pipx >/dev/null 2>&1; then
            pipx install awscli || pipx upgrade awscli
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          if ! command -v aws >/dev/null 2>&1; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            if command -v sudo >/dev/null 2>&1; then
              sudo ./aws/install --update
            else
              ./aws/install --install-dir "$HOME/.local/aws-cli" --bin-dir "$HOME/.local/bin" --update
              export PATH="$HOME/.local/bin:$PATH"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            fi
          fi
          aws --version
      - name: Load deterministic OpenStack runtime image
        if: env.ACT != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare-openstack-runtime-image.outputs.openstack_runtime_image_artifact }}
          path: /tmp
      - name: Import deterministic OpenStack runtime image
        if: env.ACT != 'true'
        run: |
          set -euo pipefail
          docker load -i /tmp/openstack-runtime-image.tar
      - name: Validate runtime image provenance
        run: |
          set -euo pipefail
          if [ -z "${PARITY_OPENSTACK_IMAGE:-}" ]; then
            echo "PARITY_OPENSTACK_IMAGE is not set"
            exit 1
          fi
          echo "Using OpenStack runtime image: ${PARITY_OPENSTACK_IMAGE}"
          actual_id="$(docker image inspect "${PARITY_OPENSTACK_IMAGE}" --format '{{.Id}}')"
          echo "Expected image id: ${PARITY_OPENSTACK_IMAGE_ID}"
          echo "Actual image id:   ${actual_id}"
          if [ -n "${PARITY_OPENSTACK_IMAGE_ID:-}" ] && [ "${actual_id}" != "${PARITY_OPENSTACK_IMAGE_ID}" ]; then
            echo "Runtime image provenance mismatch"
            exit 1
          fi
          docker image inspect "${PARITY_OPENSTACK_IMAGE}" --format 'repoTags={{json .RepoTags}} created={{.Created}} size={{.Size}}'
          version_out="$(timeout 10s docker run --rm "${PARITY_OPENSTACK_IMAGE}" --version || true)"
          if [ -z "${version_out}" ] || ! echo "${version_out}" | grep -Eq '^openstack [0-9]'; then
            echo "Runtime image smoke check failed (--version)"
            echo "version_out=${version_out:-<empty>}"
            exit 1
          fi
      - name: Preflight parity environment
        run: |
          set -euo pipefail
          command -v aws
          aws --version
          docker --version
          docker pull "$PARITY_LOCALSTACK_IMAGE"
      - name: Run parity core profile
        run: cargo run -p openstack-integration-tests --bin parity_runner -- --profile core
      - name: Add parity core table to workflow summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os

          files = sorted(glob.glob("target/parity-reports/core-*.json"), key=os.path.getmtime)
          if not files:
              print("No parity core report found")
              raise SystemExit(0)

          with open(files[-1], "r", encoding="utf-8") as handle:
              report = json.load(handle)

          summary = report.get("summary", {})
          lines = [
              "## Parity Core",
              "",
              "| Metric | Value |",
              "|---|---:|",
              f"| Profile | `{report.get('profile', 'core')}` |",
              f"| Scenarios | {summary.get('total_scenarios', 0)} |",
              f"| Passed | {summary.get('passed', 0)} |",
              f"| Failed | {summary.get('failed', 0)} |",
              f"| Accepted Differences | {summary.get('accepted_differences', 0)} |",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write("\n".join(lines) + "\n")
          PY
      - name: Upload parity report artifacts
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: parity-core-report
          path: target/parity-reports/*.json
          retention-days: 7

