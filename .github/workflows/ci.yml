          mem = report.get("memory_summary") or {}
          rss_ratio = mem.get("rss_ratio_openstack_over_localstack")
          if rss_ratio is None:
              print("Memory summary missing rss ratio")
              sys.exit(1)
          print(f"main core lane rss ratio os/ls = {rss_ratio:.3f}")
          if rss_ratio > 0.20:
              print("OpenStack RSS exceeds memory budget ratio 0.20")
              sys.exit(1)
