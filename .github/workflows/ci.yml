            echo "PARITY_OPENSTACK_IMAGE is not set"
            exit 1
          fi
          echo "Using OpenStack runtime image: ${PARITY_OPENSTACK_IMAGE}"
          actual_id="$(docker image inspect "${PARITY_OPENSTACK_IMAGE}" --format '{{.Id}}')"
          echo "Expected image id: ${PARITY_OPENSTACK_IMAGE_ID}"
          echo "Actual image id:   ${actual_id}"
          if [ -n "${PARITY_OPENSTACK_IMAGE_ID:-}" ] && [ "${actual_id}" != "${PARITY_OPENSTACK_IMAGE_ID}" ]; then
            echo "Runtime image provenance mismatch"
            exit 1
          fi
          docker image inspect "${PARITY_OPENSTACK_IMAGE}" --format 'repoTags={{json .RepoTags}} created={{.Created}} size={{.Size}}'
          version_out="$(timeout 10s docker run --rm "${PARITY_OPENSTACK_IMAGE}" --version || true)"
          if [ -z "${version_out}" ] || ! echo "${version_out}" | grep -Eq '^openstack [0-9]'; then
            echo "Runtime image smoke check failed (--version)"
            echo "version_out=${version_out:-<empty>}"
            exit 1
          fi
      - name: Preflight parity environment
        run: |
          set -euo pipefail
          command -v aws
          aws --version
          docker --version
          docker pull "$PARITY_LOCALSTACK_IMAGE"
      - name: Run parity all-services smoke full profile
        run: cargo run -p openstack-integration-tests --bin parity_runner -- --profile all-services-smoke
      - name: Validate parity lifecycle latest report exists
        run: test -f target/parity-reports/all-services-smoke-latest.json
      - name: Add parity full table to workflow summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os

          files = sorted(glob.glob("target/parity-reports/all-services-smoke-*.json"), key=os.path.getmtime)
          if not files:
              raise SystemExit(0)
          with open(files[-1], "r", encoding="utf-8") as handle:
              report = json.load(handle)
          summary = report.get("summary", {})
          lines = [
              "## Parity All Services (Full)",
              "",
              "| Metric | Value |",
              "|---|---:|",
              f"| Scenarios | {summary.get('total_scenarios', 0)} |",
              f"| Passed | {summary.get('passed', 0)} |",
              f"| Failed | {summary.get('failed', 0)} |",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write("\n".join(lines) + "\n")
          PY
      - name: Upload parity full report artifacts
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: parity-all-services-full-report
          path: target/parity-reports/*.json
          retention-days: 7

