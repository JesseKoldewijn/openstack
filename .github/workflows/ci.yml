          import json
          import os
          from pathlib import Path

          def latest(pattern):
              files = sorted(glob.glob(pattern), key=os.path.getmtime)
              return files[-1] if files else None

          lines = ["<!-- openstack-ci-results -->", "## CI Results", ""]
          lines.extend([
              "### Checks",
              "",
              "| Check | Result |",
              "|---|---|",
              f"| Rustfmt | `{os.environ.get('FMT_RESULT', 'unknown')}` |",
              f"| Clippy | `{os.environ.get('CLIPPY_RESULT', 'unknown')}` |",
              f"| Tests | `{os.environ.get('TEST_RESULT', 'unknown')}` |",
              f"| Build Artifact | `{os.environ.get('BUILD_RESULT', 'unknown')}` |",
              f"| Coverage Validation | `{os.environ.get('COVERAGE_RESULT', 'unknown')}` |",
              "",
          ])

          parity_reports = sorted(glob.glob("artifacts/parity/*.json"), key=os.path.getmtime)
          if parity_reports:
              lines.extend(["### Parity", "", "| Profile | Scenarios | Passed | Failed | Accepted |", "|---|---:|---:|---:|---:|"])
              for path in parity_reports:
                  with open(path, "r", encoding="utf-8") as handle:
                      parity = json.load(handle)
                  ps = parity.get("summary", {})
                  lines.append(
                      f"| `{parity.get('profile', 'n/a')}` | {ps.get('total_scenarios', 0)} | {ps.get('passed', 0)} | {ps.get('failed', 0)} | {ps.get('accepted_differences', 0)} |"
                  )
              lines.append("")

          full_benchmark_md = Path("benchmark_full_comment.md")
          fast_benchmark_md = Path("benchmark_fast_comment.md")
          consolidated_benchmark_md = Path("benchmark_consolidated_comment.md")
          if full_benchmark_md.exists() or fast_benchmark_md.exists() or consolidated_benchmark_md.exists():
              lines.append("### Benchmark")
              lines.append("")
              if consolidated_benchmark_md.exists():
                  lines.append(consolidated_benchmark_md.read_text(encoding="utf-8").strip())
                  lines.append("")
              if full_benchmark_md.exists():
                  lines.append(full_benchmark_md.read_text(encoding="utf-8").strip())
                  lines.append("")
              if fast_benchmark_md.exists():
                  lines.append(fast_benchmark_md.read_text(encoding="utf-8").strip())
                  lines.append("")

          content = "\n".join(lines).strip() + "\n"
          Path("pr_results_comment.md").write_text(content, encoding="utf-8")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write(content + "\n")
          PY
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.verify-build-artifact.result }}
          COVERAGE_RESULT: ${{ needs.validate-harness-coverage.result }}
      - name: Upsert PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          marker = "<!-- openstack-ci-results -->"
          body = Path("pr_results_comment.md").read_text(encoding="utf-8")

          existing_raw = subprocess.check_output(
              [
                  "gh",
                  "api",
                  f"repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
                  "--paginate",
              ],
              text=True,
          )
          comments = json.loads(existing_raw)
          match = None
          for comment in comments:
              if marker in comment.get("body", ""):
                  match = comment
                  break

          if match:
              subprocess.check_call(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['REPO']}/issues/comments/{match['id']}",
                      "--method",
                      "PATCH",
                      "-f",
                      f"body={body}",
                  ]
              )
          else:
              subprocess.check_call(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
                      "--method",
                      "POST",
                      "-f",
                      f"body={body}",
                  ]
              )
          PY
