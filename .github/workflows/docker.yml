name: Docker

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEMP_TAG_PREFIX: ci-${{ github.sha }}

jobs:
  metadata:
    name: Compute Docker metadata
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.refs.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set temporary image ref
        id: refs
        run: |
          image_repo="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          image_repo="$(printf '%s' "$image_repo" | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=${image_repo}:${{ env.TEMP_TAG_PREFIX }}-amd64" >> "$GITHUB_OUTPUT"

      - name: Build amd64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.refs.outputs.image_ref }}
          labels: ${{ needs.metadata.outputs.labels }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64

  build-arm64:
    name: Build arm64 image
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.refs.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set temporary image ref
        id: refs
        run: |
          image_repo="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          image_repo="$(printf '%s' "$image_repo" | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=${image_repo}:${{ env.TEMP_TAG_PREFIX }}-arm64" >> "$GITHUB_OUTPUT"

      - name: Build arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.refs.outputs.image_ref }}
          labels: ${{ needs.metadata.outputs.labels }}
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64

  publish-amd64-fast:
    name: Publish amd64 tags (fast path)
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [metadata, build-amd64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish amd64 tags
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              -t "$tag" \
              "${{ needs.build-amd64.outputs.image_ref }}"
          done <<< "${{ needs.metadata.outputs.tags }}"

  publish-manifest:
    name: Publish multi-arch manifest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [metadata, build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest tags
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              -t "$tag" \
              "${{ needs.build-amd64.outputs.image_ref }}" \
              "${{ needs.build-arm64.outputs.image_ref }}"
          done <<< "${{ needs.metadata.outputs.tags }}"

      - name: Validate manifest platforms
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            manifest="$(docker buildx imagetools inspect "$tag")"
            printf '%s' "$manifest" | grep -q "linux/amd64"
            printf '%s' "$manifest" | grep -q "linux/arm64"
          done <<< "${{ needs.metadata.outputs.tags }}"
