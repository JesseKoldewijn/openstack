name: Cross-compile

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "Cross.toml"
      - ".github/workflows/cross-compile.yml"
  workflow_dispatch:

concurrency:
  group: cross-compile-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-compile:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: openstack-linux-amd64
          - target: aarch64-unknown-linux-gnu
            artifact: openstack-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-compile-${{ matrix.target }}
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      # `cross` handles the cross-compilation toolchain transparently via Docker.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cross-compile release binary
        run: cross build --release --target ${{ matrix.target }} --bin openstack

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/openstack
          retention-days: 30
